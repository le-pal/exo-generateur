services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: exo-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_PATH: /data/exo.db
      FRONTEND_URL: http://localhost
    volumes:
      - exo_data:/data
    networks:
      - exo_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: exo-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - exo_net

volumes:
  exo_data:
    driver: local

networks:
  exo_net:
    driver: bridge
