services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: exo-generateur
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DB_PATH: /data/exo.db
    volumes:
      - exo_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    image: caddy:alpine
    container_name: exo-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  exo_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
